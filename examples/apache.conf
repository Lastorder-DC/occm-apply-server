# occm-apply-server Apache 리버스 프록시 설정 예시
# 이 설정은 Apache 2.4 이상에서 사용 가능합니다.
#
# 필요한 모듈 활성화:
#   sudo a2enmod proxy proxy_http ssl rewrite headers
#
# 사용법:
#   1. 이 파일을 /etc/apache2/sites-available/occm-apply-server.conf 에 복사
#   2. 도메인, SSL 인증서 경로 등을 환경에 맞게 수정
#   3. sudo a2ensite occm-apply-server.conf
#   4. sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName apply.example.com

    # HTTPS로 리다이렉트
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName apply.example.com

    # SSL 설정 (Let's Encrypt 예시)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/apply.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/apply.example.com/privkey.pem

    # 보안 헤더
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # 리버스 프록시 설정 (gunicorn이 127.0.0.1:5000에서 실행 중인 경우)
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    # 실제 클라이언트 IP 전달
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-Proto "https"

    # 로그 설정
    ErrorLog ${APACHE_LOG_DIR}/occm-apply-error.log
    CustomLog ${APACHE_LOG_DIR}/occm-apply-access.log combined
</VirtualHost>
