# occm-apply-server Nginx 리버스 프록시 설정 예시
#
# 사용법:
#   1. 이 파일을 /etc/nginx/sites-available/occm-apply-server 에 복사
#   2. 도메인, SSL 인증서 경로 등을 환경에 맞게 수정
#   3. sudo ln -s /etc/nginx/sites-available/occm-apply-server /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name apply.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name apply.example.com;

    # SSL 설정 (Let's Encrypt 예시)
    ssl_certificate /etc/letsencrypt/live/apply.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apply.example.com/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 리버스 프록시 설정 (gunicorn이 127.0.0.1:5000에서 실행 중인 경우)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 로그 설정
    access_log /var/log/nginx/occm-apply-access.log;
    error_log /var/log/nginx/occm-apply-error.log;
}
