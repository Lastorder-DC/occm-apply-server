<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - 신청 목록</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px;
            height: fit-content;
        }
        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 1.5rem;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .home-link { font-size: 0.9rem; text-decoration: none; color: #6364ff; }
        .logout-btn {
            background: none; border: none; font-size: 0.9rem; color: #ff4d4f;
            cursor: pointer; padding: 0; font-family: inherit;
        }
        .logout-btn:hover { text-decoration: underline; }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            background: #fff; border-bottom: 1px solid #eee; padding: 15px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        li:last-child { border-bottom: none; }
        .text-content { font-size: 0.95rem; color: #333; word-break: break-all; }
        .delete-btn {
            background-color: #ff4d4f; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-left: 10px; flex-shrink: 0;
        }
        .delete-btn:hover { background-color: #d9363e; }
        .role-badge {
            display: inline-block; font-size: 0.75rem; padding: 2px 7px;
            border-radius: 10px; margin-left: 6px; font-weight: bold;
            vertical-align: middle;
        }
        .role-총괄 { background-color: #e8e8ff; color: #6364ff; }
        .role-스탭 { background-color: #e8f8e8; color: #2e7d32; }
        .refresh-btn {
            background: none; border: none; font-size: 0.9rem; color: #6364ff;
            cursor: pointer; padding: 0; font-family: inherit;
        }
        .refresh-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container" data-domain="{{ mastodon_domain }}">
        <h1>
            신청 목록
            <span>
                <button type="button" class="refresh-btn" onclick="refreshList()">새로고침</button>
                &nbsp;
                <a href="/apply-admin/" class="home-link">← 신청 페이지로</a>
                &nbsp;
                <form action="/apply-admin/logout" method="POST" style="display:inline;">
                    <button type="submit" class="logout-btn">로그아웃</button>
                </form>
            </span>
        </h1>

        <ul>
            {% if items %}
                {% for item in items %}
                <li>
			<span class="text-content">
                        <a href="https://{{ mastodon_domain }}/admin/accounts?origin=local&username={{ item.id }}">{{ item.display_text }}</a>
                        {% if item.role %}
                        <span class="role-badge {% if item.role == '커뮤니티 총괄' %}role-총괄{% else %}role-스탭{% endif %}">{{ item.role }}</span>
                        {% endif %}
                    </span>
                    
                    <button type="button" class="delete-btn" data-id="{{ item.id }}" onclick="deleteItem(this)">삭제</button>
                </li>
                {% endfor %}
            {% else %}
                <li class="empty-msg">현재 대기 중인 신청 내역이 없습니다.</li>
            {% endif %}
        </ul>
    </div>
    <script>
        var mastodonDomain = document.querySelector('.container').getAttribute('data-domain');

        function refreshList() {
            fetch('/apply-admin/listman-data')
            .then(function(response) {
                return response.json().then(function(data) {
                    return { ok: response.ok, data: data };
                });
            })
            .then(function(result) {
                if (!result.data.success) {
                    alert(result.data.message);
                    return;
                }

                var ul = document.querySelector('ul');
                ul.innerHTML = '';

                var items = result.data.items;
                if (items.length === 0) {
                    var emptyLi = document.createElement('li');
                    emptyLi.className = 'empty-msg';
                    emptyLi.textContent = '현재 대기 중인 신청 내역이 없습니다.';
                    ul.appendChild(emptyLi);
                    return;
                }

                items.forEach(function(item) {
                    var li = document.createElement('li');

                    var span = document.createElement('span');
                    span.className = 'text-content';

                    var a = document.createElement('a');
                    a.href = 'https://' + mastodonDomain + '/admin/accounts?origin=local&username=' + encodeURIComponent(item.id);
                    a.textContent = item.display_text;
                    span.appendChild(a);

                    if (item.role) {
                        var badge = document.createElement('span');
                        badge.className = 'role-badge ' + (item.role === '커뮤니티 총괄' ? 'role-총괄' : 'role-스탭');
                        badge.textContent = item.role;
                        span.appendChild(badge);
                    }

                    li.appendChild(span);

                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'delete-btn';
                    btn.setAttribute('data-id', item.id);
                    btn.textContent = '삭제';
                    btn.onclick = function() { deleteItem(btn); };
                    li.appendChild(btn);

                    ul.appendChild(li);
                });
            })
            .catch(function() {
                alert('목록을 불러오는 중 오류가 발생했습니다. 다시 시도해주세요.');
            });
        }

        function deleteItem(btn) {
            var targetId = btn.getAttribute('data-id');
            if (!confirm('ID [' + targetId + '] 항목을 정말 삭제하시겠습니까?')) {
                return;
            }

            btn.disabled = true;

            fetch('/apply-admin/delete/' + encodeURIComponent(targetId), {
                method: 'POST'
            })
            .then(function(response) {
                return response.json().then(function(data) {
                    return { ok: response.ok, data: data };
                });
            })
            .then(function(result) {
                if (result.data.success) {
                    refreshList();
                } else {
                    alert(result.data.message);
                    btn.disabled = false;
                }
            })
            .catch(function() {
                alert('삭제 요청 중 오류가 발생했습니다. 다시 시도해주세요.');
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
