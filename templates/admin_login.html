<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    {% if turnstile_site_key %}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    {% endif %}
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 1.5rem; }
        input[type="password"] {
            width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd;
            border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }
        input[type="password"]:focus { border-color: #6364ff; outline: none; }
        button {
            width: 100%; padding: 12px; background-color: #6364ff; color: white;
            border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        button:hover { background-color: #5051cc; }
        .error { color: #ff4d4f; margin-bottom: 1rem; font-size: 0.9rem; }
        .cf-turnstile { display: flex; justify-content: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>관리자 로그인</h1>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form action="/apply-admin/admin-login" method="POST">
            <input type="password" name="password" placeholder="비밀번호" required autofocus>
            {% if turnstile_site_key %}
            <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}"></div>
            {% endif %}
            <button type="submit">로그인</button>
        </form>
    </div>
</body>
</html>
